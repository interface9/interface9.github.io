<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MyTube</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    #sidebar {
      width: 260px;
      background: #1a1a1a;
      border-right: 2px solid #000;
      display: flex;
      flex-direction: column;
    }

    #searchContainer {
      padding: 12px;
      background: #181818;
      border-bottom: 1px solid #000;
      box-sizing: border-box;
    }

    #searchBox {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      color: #eee;
      background: #222;
      border: 1px solid #333;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      box-sizing: border-box;
    }

    #searchBox:focus {
      border-color: #555;
      background: #262626;
    }

    #channelList {
      flex: 1;
      overflow-y: auto;
    }

    .channel {
      display: flex;
      align-items: center;
      padding: 8px;
      cursor: pointer;
      border-bottom: 1px solid #222;
    }

    .channel:hover {
      background: #333;
    }

    /* Active channel highlight */
    .channel.active {
      background: #444 !important;
      border-left: 3px solid #4da3ff;
    }

    .thumb {
      width: 60px;
      height: 40px;
      min-width: 60px;
      min-height: 40px;
      max-width: 60px;
      max-height: 40px;
      background: #2a2a2a;
      border: 1px solid #333;
      border-radius: 4px;
      margin-right: 10px;
      object-fit: contain;
      display: block;
      flex-shrink: 0;
      position: relative;
    }

    .thumb:not([src]),
    .thumb[src=""] {
      background: #2a2a2a;
    }

    .thumb:not([src])::before,
    .thumb[src=""]::before {
      content: "";
      position: absolute;
      top: 8px;
      left: 10px;
      width: 40px;
      height: 24px;
      border: 2px solid #444;
      border-radius: 3px;
      opacity: 0.35;
    }

    .thumb:not([src])::after,
    .thumb[src=""]::after {
      content: "";
      position: absolute;
      top: 4px;
      left: 26px;
      width: 8px;
      height: 4px;
      background: #444;
      border-radius: 1px;
      opacity: 0.35;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #topbar {
      padding: 12px;
      background: #181818;
      display: flex;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid #000;
      box-sizing: border-box;
    }

    #m3uInput {
      flex: 1;
      padding: 10px 12px;
      font-size: 15px;
      color: #eee;
      background: #222;
      border: 1px solid #333;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      box-sizing: border-box;
    }

    #m3uInput:focus {
      border-color: #555;
      background: #262626;
    }

    /* Player wrapper with 16:9 */
    #playerWrapper {
      position: relative;
      flex: 1;
      background: #000;
      margin: 10px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
      aspect-ratio: 16 / 9;
    }

    #playerWrapper iframe,
    #playerWrapper video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      object-fit: contain;
      background: #000;
    }

    /* 3-line footer */
    #footer {
      height: 74px;
      background: #181818;
      border-top: 1px solid #000;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.4;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .scroll-line {
      white-space: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .scroll-line::-webkit-scrollbar {
      display: none;
    }

    .scroll-line {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>

<body>

  <div id="sidebar">
    <div id="searchContainer">
      <input id="searchBox" type="text" placeholder="Search channels...">
    </div>
    <div id="channelList"></div>
  </div>

  <div id="main">
    <div id="topbar">
      <input id="m3uInput" type="text"
        placeholder="Enter M3U URL..."
        value="MyTube.list">
    </div>

    <div id="playerWrapper"></div>

    <div id="footer">
      <div id="footer-title"><strong>None</strong></div>
      <div id="footer-url" class="scroll-line">None</div>
      <div id="footer-stats" class="scroll-line">
        Resolution: N/A | Bitrate: N/A | Level: N/A | Buffer: N/A | EPG: N/A
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <script>
    let allChannels = [];

    const titleEl = document.getElementById("footer-title");
    const urlEl = document.getElementById("footer-url");
    const statsEl = document.getElementById("footer-stats");
    const playerWrapper = document.getElementById("playerWrapper");

    // Reused elements
    let videoEl = null;
    let iframeEl = null;

    // HLS state
    let hls = null;
    let isHls = false;
    let isYoutube = false;
    let manifestHandler = null;

    // Stats timer
    let statsTimer = null;

    const YOUTUBE_CHANNELS = [
      {
        name: "YouTube: Video 1",
        url: "https://www.youtube.com/embed/AYdQUS7jfPA",
        thumb: "https://img.youtube.com/vi/AYdQUS7jfPA/hqdefault.jpg"
      },
      {
        name: "YouTube: Video 2",
        url: "https://www.youtube.com/embed/ssix9qlNiTQ",
        thumb: "https://img.youtube.com/vi/ssix9qlNiTQ/hqdefault.jpg"
      }
    ];

    // --- Stats timer control ---
    function startStats() {
      if (!statsTimer) statsTimer = setInterval(updateStats, 1000);
    }

    function stopStats() {
      if (statsTimer) {
        clearInterval(statsTimer);
        statsTimer = null;
      }
    }

    // --- Player element management ---
    function ensureVideoElement() {
      if (!videoEl) {
        videoEl = document.createElement("video");
        videoEl.controls = true;
      }
      if (!videoEl.parentNode) {
        playerWrapper.innerHTML = "";
        playerWrapper.appendChild(videoEl);
      }
      return videoEl;
    }

    function ensureIframeElement() {
      if (!iframeEl) {
        iframeEl = document.createElement("iframe");
        iframeEl.allow =
          "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
        iframeEl.allowFullscreen = true;
      }
      if (!iframeEl.parentNode) {
        playerWrapper.innerHTML = "";
        playerWrapper.appendChild(iframeEl);
      }
      return iframeEl;
    }

    function unloadVideo() {
      if (videoEl) {
        videoEl.pause();
        videoEl.removeAttribute("src");
        videoEl.load();
      }
    }

    function unloadIframe() {
      if (iframeEl) iframeEl.src = "about:blank";
    }

    // --- HLS lifecycle ---
    function destroyHls() {
      if (hls) {
        if (manifestHandler) {
          hls.off(Hls.Events.MANIFEST_PARSED, manifestHandler);
          manifestHandler = null;
        }
        hls.destroy();
        hls = null;
      }
    }

    function setupHls(url, video) {
      destroyHls();

      hls = new Hls({
        maxBufferLength: 30,
        maxMaxBufferLength: 60
      });
      hls.loadSource(url);
      hls.attachMedia(video);

      manifestHandler = () => video.play().catch(() => {});
      hls.on(Hls.Events.MANIFEST_PARSED, manifestHandler);
    }

    // --- Playlist + search ---
    document.getElementById("m3uInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const url = e.target.value.trim();
        if (url) loadPlaylist(url);
      }
    });

    // Live search filter
    document.getElementById("searchBox").addEventListener("input", () => {
      const term = document.getElementById("searchBox").value.toLowerCase();
      const filtered = allChannels.filter(ch =>
        ch.name.toLowerCase().includes(term)
      );
      renderChannelList(filtered);
    });

    async function loadPlaylist(url) {
      const freshUrl = url + (url.includes("?") ? "&" : "?") + "_ts=" + Date.now();
      const res = await fetch(freshUrl, { cache: "no-store" });

      const text = await res.text();
      const lines = text.split(/\r?\n/);

      const channels = [];
      let currentName = "Unknown Channel";
      let currentLogo = "";

      for (let line of lines) {
        line = line.trim();

        if (line.startsWith("#EXTINF")) {
          const lastCommaIndex = line.lastIndexOf(",");
          currentName =
            lastCommaIndex !== -1 ? line.substring(lastCommaIndex + 1).trim() : "Unnamed Channel";

          const logoMatch = line.match(/tvg-logo="([^"]+)"/);
          currentLogo = logoMatch ? logoMatch[1] : "";
        }
        else if (line && !line.startsWith("#")) {
          channels.push({
            name: currentName,
            url: line,
            thumb: currentLogo
          });
        }
      }

      channels.push(...YOUTUBE_CHANNELS);

      allChannels = channels;
      renderChannelList(allChannels);
      if (allChannels.length > 0) playChannel(allChannels[0]);
    }

    function renderChannelList(channels) {
      const list = document.getElementById("channelList");
      list.innerHTML = "";

      channels.forEach((ch) => {
        const div = document.createElement("div");
        div.className = "channel";

        div.innerHTML = `
          <img class="thumb" loading="lazy" src="${ch.thumb || ''}" alt="">
          <span>${ch.name}</span>
        `;

        div.addEventListener("click", () => playChannel(ch));
        list.appendChild(div);
      });
    }

    // --- Core playback ---
    function playChannel(channel) {
      // Update footer
      titleEl.innerHTML = "<strong>" + channel.name + "</strong>";
      urlEl.textContent = channel.url;

      isYoutube = channel.url.includes("youtube.com/embed");
      isHls = channel.url.endsWith(".m3u8");

      // Stop stats while switching
      stopStats();

      // Clean up previous playback
      destroyHls();
      unloadVideo();
      unloadIframe();

      /* Highlight active channel */
      document.querySelectorAll(".channel.active").forEach(el =>
        el.classList.remove("active")
      );

      const list = document.getElementById("channelList");
      const items = list.querySelectorAll(".channel");

      for (const item of items) {
        const name = item.querySelector("span")?.textContent;
        if (name === channel.name) {
          item.classList.add("active");
          item.scrollIntoView({ block: "nearest", behavior: "smooth" });
          break;
        }
      }

      if (isYoutube) {
        const iframe = ensureIframeElement();
        iframe.src = channel.url;
        statsEl.textContent =
          "Resolution: N/A | Bitrate: N/A | Level: N/A | Buffer: N/A | EPG: N/A";
        startStats();
        return;
      }

      const video = ensureVideoElement();

      if (Hls.isSupported() && isHls) {
        setupHls(channel.url, video);
      } else {
        video.src = channel.url;
        video.play().catch(() => {});
      }

      startStats();
    }

    // --- Stats ---
    function updateStats() {
      if (isYoutube) {
        statsEl.textContent =
          "Resolution: N/A | Bitrate: N/A | Level: N/A | Buffer: N/A | EPG: N/A";
        return;
      }

      const video = videoEl;
      if (!video || !video.parentNode) return;

      const width = video.videoWidth || 0;
      const height = video.videoHeight || 0;
      const resolution = width && height ? `${width}×${height}` : "N/A";

      let bitrate = "N/A";
      let level = "N/A";
      let buffer = "N/A";

      if (hls && hls.levels && hls.currentLevel >= 0) {
        const lvl = hls.levels[hls.currentLevel];
        bitrate = lvl.bitrate ? Math.round(lvl.bitrate / 1000) + " kbps" : "N/A";
        level = hls.currentLevel;
      }

      if (video.buffered && video.buffered.length) {
        buffer = (
          video.buffered.end(video.buffered.length - 1) - video.currentTime
        ).toFixed(1) + "s";
      }

      statsEl.textContent =
        `Resolution: ${resolution} | Bitrate: ${bitrate} | Level: ${level} | Buffer: ${buffer} | EPG: N/A`;
    }

    // --- Init ---
    loadPlaylist(document.getElementById("m3uInput").value);
  </script>

</body>
</html>
