<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  
<title>Dark Glass Image Gallery</title>

<style>
  body {
    font-family: Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: #0a0a0a;
    color: #eee;
    text-align: center;
  }

  .container {
    width: 100%;
    max-width: 900px;
    margin: 20px auto;
    padding: 20px;
    background: rgba(30, 30, 30, 0.55);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
  }

  /* Thumbnails */
  .thumbs img {
    width: 120px;
    margin: 8px;
    border: 3px solid #444;
    background: #000;
    box-shadow: 0 0 6px rgba(0,0,0,0.6);
    cursor: pointer;
    opacity: 0.85;
    transition: opacity 0.3s;
  }

  .thumbs img:hover {
    opacity: 1;
    border-color: #888;
  }

  /* FULLSCREEN LIGHTBOX */
  #lightboxOverlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(5,5,5,0.9);
    text-align: center;
    z-index: 9999;
  }

  #lightboxImage {
    max-width: 95%;
    max-height: 80%;
    margin-top: 4%;
    border: 4px solid #666;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
    opacity: 0;
    transition: opacity 0.5s ease-in-out;
  }

  /* Caption */
  #caption {
    margin-top: 10px;
    font-size: 18px;
    color: #ccc;
  }

  /* Close button */
  #closeBtn {
    position: absolute;
    top: 12px;
    right: 18px;
    font-size: 40px;
    color: #eee;
    cursor: pointer;
    z-index: 10000;
    text-shadow: 0 0 10px black;
  }

  /* Tap zones for navigation */
  .navZone {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    z-index: 9000;
  }

  #leftZone { left: 0; }
  #rightZone { right: 0; }
</style>
</head>

<body>

<div class="container">

  <div class="thumbs">
    <img src="img1.jpg" onclick="openFromThumb(0)">
    <img src="img2.jpg" onclick="openFromThumb(1)">
    <img src="img3.jpg" onclick="openFromThumb(2)">
    <img src="img4.jpg" onclick="openFromThumb(3)">
  </div>

</div>

<!-- LIGHTBOX OVERLAY -->
<div id="lightboxOverlay">

  <div id="closeBtn" onclick="closeLightbox()">×</div>

  <!-- Tap zones -->
  <div id="leftZone" class="navZone" onclick="prev()"></div>
  <div id="rightZone" class="navZone" onclick="next()"></div>

  <img id="lightboxImage" src="">
  <div id="caption"></div>

</div>

<script>
var images = ["img1.jpg","img2.jpg","img3.jpg","img4.jpg"];
var captions = [
  "Caption for Image 1",
  "Caption for Image 2",
  "Caption for Image 3",
  "Caption for Image 4"
];

var index = 0;
var slideshow = null;

/* Open from thumbnail */
function openFromThumb(i) {
  index = i;
  openLightbox();
}

/* LIGHTBOX */
function openLightbox() {
  var overlay = document.getElementById("lightboxOverlay");
  var img = document.getElementById("lightboxImage");
  var cap = document.getElementById("caption");

  img.style.opacity = 0;
  img.src = images[index];
  cap.innerHTML = captions[index];

  overlay.style.display = "block";

  setTimeout(function() {
    img.style.opacity = 1;
  }, 50);
}

function closeLightbox() {
  document.getElementById("lightboxOverlay").style.display = "none";
  stopSlideshow();
}

/* Navigation */
function next() {
  index = (index + 1) % images.length;
  openLightbox();
}

function prev() {
  index = (index - 1 + images.length) % images.length;
  openLightbox();
}

/* Swipe support (old iPad compatible) */
var startX = 0;

document.getElementById("lightboxOverlay").ontouchstart = function(e) {
  startX = e.touches[0].clientX;
};

document.getElementById("lightboxOverlay").ontouchend = function(e) {
  var endX = e.changedTouches[0].clientX;
  var diff = endX - startX;

  if (diff > 60) prev();
  else if (diff < -60) next();
};

/* Optional slideshow */
function startSlideshow() {
  stopSlideshow();
  slideshow = setInterval(function() {
    next();
  }, 3000);
}

function stopSlideshow() {
  if (slideshow) clearInterval(slideshow);
  slideshow = null;
}
</script>

</body>
</html>
